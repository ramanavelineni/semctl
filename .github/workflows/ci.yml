name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          # Pinned so a new linter release can't break unrelated PRs.
          # Keep in sync with the local dev install; bump deliberately.
          version: v2.10.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -s -l . | grep -v '^pkg/semapi/' || true)
          if [ -n "$unformatted" ]; then
            echo "Files not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: go build ./...

      - name: Cross-compile release targets
        # Darwin/Windows binaries otherwise go uncompiled until release day.
        run: |
          for target in darwin/amd64 darwin/arm64 windows/amd64 linux/arm64; do
            echo "building $target"
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 go build ./... || exit 1
          done

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
